services:
  api_mariadb:
    image: mariadb:11.4
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-api-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - api_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - aea_network

  phpmyadmin:
    container_name: MYADMIN
    image: phpmyadmin/phpmyadmin
    links:
      - api_mariadb:db
    expose:
      - "80"
    networks:
      - aea_network
    env_file:
      - .env
    depends_on:
      api_mariadb:
        condition: service_healthy

  phpmyadmin-proxy:
    image: node:20-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-phpmyadmin-proxy
    restart: unless-stopped
    command: >
      sh -lc "node -e \"const http=require('http');http.createServer((req,res)=>{const o={hostname:'phpmyadmin',port:80,path:req.url,method:req.method,headers:req.headers};const p=http.request(o,(pr)=>{res.writeHead(pr.statusCode||502,pr.headers);pr.pipe(res);});p.on('error',(e)=>{res.statusCode=502;res.end('proxy error: '+e.message)});req.pipe(p);}).listen(8765,'0.0.0.0');\""
    depends_on:
      phpmyadmin:
        condition: service_started
    ports:
      - "8765:8765"
    networks:
      - aea_network

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-api-gateway
    restart: unless-stopped
    depends_on:
      api_mariadb:
        condition: service_healthy
    volumes:
      - ../../api-gateway:/app
      - /app/node_modules
    env_file:
      - ../../api-gateway/.env
    environment:
      DB_HOST: api_mariadb
      DB_PORT: 3306
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aea_network

  calc-bot:
    build:
      context: ../../calc-bot
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-calc-bot
    restart: unless-stopped
    depends_on:
      api_mariadb:
        condition: service_healthy
    volumes:
      - ../../calc-bot:/app
      - /app/node_modules
    env_file:
      - ../../calc-bot/.env
    environment:
      DB_HOST: api_mariadb
      DB_PORT: 3306
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aea_network

  che-parser-bot:
    build:
      context: ../../che-parser-bot
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-che-parser-bot
    restart: unless-stopped
    depends_on:
      api_mariadb:
        condition: service_healthy
      cdn-media-bot:
        condition: service_started
    volumes:
      - ../../che-parser-bot:/app
      - /app/node_modules
      - che_parser_data:/app/data
    env_file:
      - ../../che-parser-bot/.env
    environment:
      DB_HOST: api_mariadb
      DB_PORT: 3306
      NODE_ENV: ${NODE_ENV:-production}
      MEDIA_SERVICE_URL: http://cdn-media-bot:3010
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aea_network

  cdn-media-bot:
    build:
      context: ../../cdn-media-bot
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-simpleweb}-cdn-media-bot
    restart: unless-stopped
    volumes:
      - cdn_media_data:/app/media
      - ../../cdn-media-bot:/app
      - /app/node_modules
    env_file:
      - ../../cdn-media-bot/.env
    expose:
      - "3010"
    ports:
      - "${CDN_MEDIA_BOT_PORT:-3010}:3010"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aea_network

